# ~/.config/hypr/hyprtoolkit.conf

# Main background
background = 0xFF343B4F

# Cards, search box, list items
base = 0xFF40485F

# Selected rows / hover states
alternate_base = 0xFF4C5672

# Primary text
text = 0xFFE6EBF5

# Highlighted text
bright_text = 0xFFFFFFFF

# Motorsport accent
accent = 0xFFF5A97F

# Secondary accent
accent_secondary = 0xFF8AADF4

# Typography
h1_size = 24
h2_size = 18
h3_size = 14