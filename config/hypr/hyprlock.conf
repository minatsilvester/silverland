$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = smooth, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 5, smooth
    animation = fadeOut, 1, 5, smooth
    animation = inputFieldDots, 1, 2, smooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.95
    brightness = 0.78
    vibrancy = 0.18
    vibrancy_darkness = 0.2
}

# Password input
input-field {
    monitor =
    size = 340, 54
    outline_thickness = 2

    inner_color = rgba(64, 72, 95, 0.72)
    outer_color = rgba(f5a97fee) rgba(8aadf4ee) 45deg
    check_color = rgba(8bd5caee) rgba(8aadf4ee) 45deg
    fail_color = rgba(ed8796ee) rgba(f5a97fee) 45deg

    font_color = rgb(e6ebf5)
    fade_on_empty = false
    rounding = 16

    font_family = $font
    placeholder_text = <span foreground="##a8b0c0">Enter password</span>
    fail_text = <span foreground="##ed8796">Authentication failed</span>

    dots_spacing = 0.25
    dots_size = 0.35

    position = 0, -70
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 92
    font_family = $font
    color = rgb(e6ebf5)

    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = $font
    color = rgb(a8b0c0)

    position = 0, 45
    halign = center
    valign = center
}

# Small lock/status hint
label {
    monitor =
    text = locked
    font_size = 14
    font_family = $font
    color = rgb(f5a97f)

    position = 0, -135
    halign = center
    valign = center
}

# Keyboard layout
label {
    monitor =
    text = $LAYOUT
    font_size = 14
    font_family = $font
    color = rgb(8aadf4)
    onclick = hyprctl switchxkblayout all next

    position = 24, -24
    halign = left
    valign = top
}